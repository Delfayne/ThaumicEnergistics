# Builds and publishes a GitHub Release whenever a PR is merged to main and
# gradle.properties' modVersion has changed since the last release.

name: Release

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      should_release: ${{ steps.version.outputs.should_release }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Determine whether modVersion is new
        id: version
        run: |
          MOD_VERSION=$(grep -Po '(?<=^modVersion=).*' gradle.properties)
          TAG="v$MOD_VERSION"
          echo "version=$MOD_VERSION" >> "$GITHUB_OUTPUT"
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "Tag $TAG already exists, skipping release."
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "New version $MOD_VERSION detected, will release as $TAG."
          fi

  release:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build with Gradle
        run: ./gradlew build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          name: v${{ needs.check-version.outputs.version }}
          generate_release_notes: true
          files: |
            build/libs/*.jar
            !build/libs/*-dev.jar
            !build/libs/*-api.jar
